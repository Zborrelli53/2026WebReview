<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Files</title>
</head>
<body>
    <form action="mailto:student@sllboces.org" method="POST">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" required><br>

        <label for="grade" required>Grade Level</label>
        <select name="grade" id="grade">
            <option value="9">9th Grade</option>
            <option value="10">10th Grade</option>
            <option value="11">11th Grade</option>
        </select><br>

        <label for="bio" required>Tell us about yourself:</label>
        <textarea name="bio" id="bio" rows="4"></textarea><br>

        <input type="checkbox" id="agree" name="agree"required>
        <label for="agree">I agree with the terms and conditions.</label><br>

        <p>Please select which major you want to persue</p>
        <input type="radio" id="colMaj" name="major" value="game">
        <label for="colMaj">Game Design</label>
        <input type="radio" id="colMaj" name="major" value="cybr">
        <label for="colMaj">Cybersecurity</label><br>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
