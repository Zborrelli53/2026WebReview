<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Layout</title>
</head>
<body>
    <header>
        <nav>Home About OtherStuff</nav><!-- Flexbox -->
    </header>
    
    <section id="hero"> <!-- full-width hero image -->
        
    </section>

    <main>
        <section id="about">...</section>   <!-- Student Biography -->
        <section id="courses">...</section> <!-- What you have learned -->
        <section id="projects">...</section>    <!-- Links to Web Projects -->
        <aside id="form">...</aside>    <!-- Not required -->
    </main>

    <footer>        <!-- flexbox -->
        <nav id="footer">...</nav>
        <section id="copy">...</section>
        <section id="contact"></section>
    </footer>
</body>
</html>
