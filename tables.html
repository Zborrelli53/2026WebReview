<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <!-- What are tables used for? Displaying Data -->
    <!-- NEVER use tables for layout design -->
    <!-- table>(thead>tr>th*3)+(tbody>tr*3>td*3) (Emmet code for tables)-->
    <table>
        <thead>             <!-- Header section of the table -->
            <tr>            <!-- Header Row -->
                <th>Unit</th>   <!-- Header cell 1 -->
                <th>Topic</th>   <!-- Header cell 2 -->
                <th>Project</th>   <!-- Header cell 3 -->
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Unit 1</td>
                <td>Fundamentals of Html</td>
                <td>Personal Webpage</td>
            </tr>
            <tr>
                <th>Unit 2</td>
                <td>CSS Styling</td>
                <td>Style the Personal Webpage</td>
            </tr>
            <tr>
                <th>Unit 3</td>
                <td>Cybersecurity</td>
                <td>Multiple</td>
            </tr>
            <tr>
                <th>SUNY Canton</td>
                <td>CYBR 181</td>
                <td>Python programming projects</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
